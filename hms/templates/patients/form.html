{% extends 'base.html' %}
{% block title %}{{ action }} Patient{% endblock %}
{% block page_title %}{{ action }} Patient{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card hms-card">
            <div class="card-header hms-card-header">
                <i class="bi bi-person-{{ 'plus' if action == 'Add' else 'gear' }} me-2"></i>
                {{ action }} Patient Record
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label required">First Name</label>
                            <input type="text" name="first_name" class="form-control hms-input"
                                   value="{{ patient.first_name if patient else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label required">Last Name</label>
                            <input type="text" name="last_name" class="form-control hms-input"
                                   value="{{ patient.last_name if patient else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label required">Date of Birth</label>
                            <input type="date" name="dob" class="form-control hms-input"
                                   value="{{ patient.dob.strftime('%Y-%m-%d') if patient else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label required">Gender</label>
                            <select name="gender" class="form-select hms-input" required>
                                <option value="">Select gender</option>
                                {% for g in ['Male', 'Female', 'Other'] %}
                                <option value="{{ g }}" {% if patient and patient.gender == g %}selected{% endif %}>{{ g }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label required">Phone</label>
                            <input type="tel" name="phone" class="form-control hms-input"
                                   value="{{ patient.phone if patient else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control hms-input"
                                   value="{{ patient.email if patient else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Blood Group</label>
                            <select name="blood_group" class="form-select hms-input">
                                <option value="">Unknown</option>
                                {% for bg in ['A+', 'A-', 'B+', 'B-', 'AB+', 'AB-', 'O+', 'O-'] %}
                                <option value="{{ bg }}" {% if patient and patient.blood_group == bg %}selected{% endif %}>{{ bg }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Emergency Contact</label>
                            <input type="text" name="emergency_contact" class="form-control hms-input"
                                   value="{{ patient.emergency_contact if patient else '' }}" placeholder="Name & Phone">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Address</label>
                            <textarea name="address" class="form-control hms-input" rows="2">{{ patient.address if patient else '' }}</textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Known Allergies</label>
                            <textarea name="allergies" class="form-control hms-input" rows="2"
                                      placeholder="List any known drug or food allergies">{{ patient.allergies if patient else '' }}</textarea>
                        </div>
                        <div class="col-12 border-top pt-3 d-flex gap-2">
                            <button type="submit" class="btn btn-hms-primary">
                                <i class="bi bi-check-lg me-1"></i>{{ action }} Patient
                            </button>
                            <a href="{{ url_for('patients.list_patients') }}" class="btn btn-outline-secondary">Cancel</a>
                            {% if patient %}
                            <button type="button" class="btn btn-outline-danger ms-auto"
                                    onclick="confirmDelete('{{ url_for('patients.delete_patient', id=patient.patient_id) }}', 'Delete patient {{ patient.full_name }}?')">
                                <i class="bi bi-trash me-1"></i>Delete
                            </button>
                            {% endif %}
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
