<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #f8faff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .error-card { text-align: center; max-width: 420px; padding: 48px 32px; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .error-code { font-size: 96px; font-weight: 700; color: #4378f4; line-height: 1; }
        h2 { font-size: 24px; font-weight: 600; color: #1a1a2e; margin: 16px 0 8px; }
        p { color: #6b7280; margin-bottom: 24px; }
    </style>
</head>
<body>
<div class="error-card">
    <div class="error-code">404</div>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn btn-primary"><i class="bi bi-house me-2"></i>Back to Dashboard</a>
</div>
</body>
</html>
